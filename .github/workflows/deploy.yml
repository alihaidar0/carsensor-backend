# ==============================================================
# .github/workflows/deploy.yml
#
# Deploys to Render on every push to main.
# Render pulls latest code from GitHub and rebuilds.
# ==============================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" | \
          python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('deploy',{}).get('id','triggered'))"
